name: PR Preview Comment

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Post or update preview comment
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const encodedBranch = encodeURIComponent(branch);
            const baseUrl = 'https://www.ssw.com.au/rules/preview';
            const COMMENT_MARKER = '<!-- tina-preview-comment -->';

            // Get all files changed in this PR
            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            // Filter to rule.mdx and category .mdx files (excluding deleted files)
            const relevantFiles = changedFiles.filter(f =>
              f.status !== 'removed' &&
              (f.filename.match(/rule\.mdx$/) || f.filename.match(/^categories\/.+\.mdx$/))
            );

            // Extract uri from frontmatter for each file via GitHub API
            const links = [];
            for (const file of relevantFiles) {
              try {
                const { data: blob } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: file.filename,
                  ref: context.payload.pull_request.head.sha,
                });

                const content = Buffer.from(blob.content, 'base64').toString('utf8');
                const uriMatch = content.match(/^uri:\s*(\S+)/m);
                const titleMatch = content.match(/^title:\s*(.+)/m);
                if (uriMatch) {
                  const uri = uriMatch[1].trim();
                  const title = titleMatch ? titleMatch[1].trim() : uri;
                  const previewUrl = `${baseUrl}?branch=${encodedBranch}&uri=${encodeURIComponent(uri)}`;
                  links.push(`- [${title}](${previewUrl})`);
                }
              } catch (e) {
                console.warn(`Could not read ${file.filename}:`, e.message);
              }
            }

            // No relevant files changed — nothing to comment
            if (links.length === 0) return;

            const body = [
              COMMENT_MARKER,
              '## 🔍 Preview PR Changes',
              '',
              'View updated pages in edit mode:',
              '',
              links.join('\n'),
              '',
              `> **Branch:** \`${branch}\``,
            ].join('\n');

            // Find existing preview comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body?.includes(COMMENT_MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
