name: PR Preview Comment

on:
  pull_request:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post preview link comment
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const encodedBranch = encodeURIComponent(branch);
            const previewUrl = `https://www.ssw.com.au/rules/preview?branch=${encodedBranch}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### TinaCMS Preview\n\nClick the link below to open the TinaCMS admin panel with this PR's branch pre-selected:\n\n🔗 ${previewUrl}`,
            });
