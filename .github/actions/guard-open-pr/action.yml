name: "Guard — no open PR for label"
description: "Fails the workflow if an open PR already exists with the given label and workflow ID marker."

inputs:
  label_name:
    description: "GitHub label to search for on open PRs."
    required: true
  workflow_id:
    description: "The gh-aw-workflow-id marker to match in the PR body."
    required: true

runs:
  using: composite
  steps:
    - name: Guard — no open PR for this label
      uses: actions/github-script@v7
      with:
        script: |
          const labelName = '${{ inputs.label_name }}';
          const workflowId = '${{ inputs.workflow_id }}';
          const q = `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open label:${labelName} "gh-aw-workflow-id: ${workflowId}"`;
          const { data } = await github.rest.search.issuesAndPullRequests({ q });
          if (data.total_count > 0) {
            const number = data.items[0].number;
            core.setFailed(`An open PR already exists for label '${labelName}' (PR #${number}). Skipping to avoid duplicates.`);
          } else {
            core.info(`No open PR found for label '${labelName}' with workflow ID '${workflowId}'. Proceeding.`);
          }
